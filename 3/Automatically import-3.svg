<svg xmlns="http://www.w3.org/2000/svg" width="547" height="190" viewBox="0 0 547 190">
  <text id="Automatically_import" data-name="Automatically import" fill="#606060" font-size="24" font-family="SegoeUI, Segoe UI"><tspan x="0" y="26">На этом шаге важно указать расстояние от </tspan><tspan x="0" y="53">откачивающей скважин до наблюдательно, в </tspan><tspan x="0" y="80">метрах. Если отдельной наблюдательной </tspan><tspan x="0" y="107">скважины нет, а наблюдения выполнялись в </tspan><tspan x="0" y="134">откачивающей скважине, то за расстояние </tspan><tspan x="0" y="161">принимается радиус скважины</tspan></text>
</svg>
