<svg xmlns="http://www.w3.org/2000/svg" width="547" height="396" viewBox="0 0 547 396">
  <text id="Automatically_import" data-name="Automatically import" fill="#606060" font-size="24" font-family="SegoeUI, Segoe UI"><tspan x="0" y="26">На первом шаге выбирается предполагаемый </tspan><tspan x="0" y="53">тип водоносного горизонта (напорный, </tspan><tspan x="0" y="80">безнапорный, с перетеканием).</tspan><tspan x="0" y="112"></tspan><tspan x="0" y="144">Далее задается имя откачивающей скважины и </tspan><tspan x="0" y="171">ее расход. Размерность расхода можно выбрать </tspan><tspan x="0" y="198">(по умолчанию расход вводится в м</tspan><tspan y="198" font-size="13.999" baseline-shift="7.999199924145271">3</tspan><tspan y="198">/сут).</tspan><tspan x="0" y="230"></tspan><tspan x="0" y="262">Далее задается мощность водоносного </tspan><tspan x="0" y="289">горизонта. Для безнапорного пласта - это </tspan><tspan x="0" y="316">обводненная мощность пород. Для напорного </tspan><tspan x="0" y="343">пласта и пласта с перетеканием - это мощность </tspan><tspan x="0" y="370">проницаемых пород опробуемого интервала.</tspan></text>
</svg>
