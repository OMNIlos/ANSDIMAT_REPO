<svg xmlns="http://www.w3.org/2000/svg" width="547" height="190" viewBox="0 0 547 190">
  <text id="Automatically_import" data-name="Automatically import" fill="#606060" font-size="24" font-family="SegoeUI, Segoe UI"><tspan x="0" y="26">На этом шаге необходимо установить дату и </tspan><tspan x="0" y="53">время начала откачки и начала восстановления. </tspan><tspan x="0" y="80">Для опытной скважины ввести данные замеров </tspan><tspan x="0" y="107" xml:space="preserve">уровней воды.  Добавить дополнительные </tspan><tspan x="0" y="134">наблюдательные скважины, если таковые </tspan><tspan x="0" y="161">имеются.</tspan></text>
</svg>
